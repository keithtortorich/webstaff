name: WebStaff CD — Deploy

on:
  workflow_run:
    workflows: ["WebStaff CI — Validate & Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      client_intake:
        description: "Path to client intake JSON (relative to repo root)"
        required: true
        default: "tests/fixtures/example_intake.json"
      platform:
        description: "Deploy platform"
        required: true
        default: "netlify"
        type: choice
        options:
          - netlify
          - vercel

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Only run if CI passed ─────────────────────────────────────────────────
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI passed
        run: echo "CI green — proceeding with deploy."

  # ── Deploy to Netlify ─────────────────────────────────────────────────────
  deploy-netlify:
    name: Deploy → Netlify
    runs-on: ubuntu-latest
    needs: check-ci
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.platform == 'netlify' ||
      github.event_name == 'workflow_run'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build client site
        run: |
          INTAKE="${{ github.event.inputs.client_intake || 'tests/fixtures/example_intake.json' }}"
          python3 builder/site_generator.py --intake "$INTAKE"
          echo "BUILD_DIR=$(ls -td clients/*/ | head -1)" >> $GITHUB_ENV

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy \
            --dir "${{ env.BUILD_DIR }}" \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --prod \
            --message "WebStaff auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ── Deploy to Vercel ──────────────────────────────────────────────────────
  deploy-vercel:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: check-ci
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.platform == 'vercel'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build client site
        run: |
          INTAKE="${{ github.event.inputs.client_intake }}"
          python3 builder/site_generator.py --intake "$INTAKE"
          echo "BUILD_DIR=$(ls -td clients/*/ | head -1)" >> $GITHUB_ENV

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN:   ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:  ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel \
            --token "$VERCEL_TOKEN" \
            --cwd "${{ env.BUILD_DIR }}" \
            --prod \
            --yes

  # ── Notify on failure ─────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-netlify, deploy-vercel]
    if: failure()
    steps:
      - name: Post failure summary
        run: |
          echo "::error::WebStaff deploy failed. Check the logs above."
          echo "Failed at: $(date -u)"
