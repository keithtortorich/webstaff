name: WebStaff CI — Validate & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Lint and validate ──────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 builder/ api/ --max-line-length=100 --ignore=E501,W503

      - name: Validate example intake
        run: |
          python3 builder/site_generator.py \
            --intake tests/fixtures/example_intake.json \
            --validate
        continue-on-error: false

  # ── Job 2: Build test site ────────────────────────────────────────────────
  build:
    name: Build Test Site
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build example client site
        run: |
          python3 builder/site_generator.py \
            --intake tests/fixtures/example_intake.json

      - name: Verify output
        run: |
          ls -la clients/
          # Ensure index.html and manifest were produced
          find clients/ -name "index.html" | head -5
          find clients/ -name "webstaff-manifest.json" | head -5

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webstaff-test-build
          path: clients/
          retention-days: 7
