name: WebStaff CI — Validate & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - run: python3 builder/site_generator.py --intake tests/fixtures/example_intake.json --validate

  build:
    name: Build Test Site
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - run: python3 builder/site_generator.py --intake tests/fixtures/example_intake.json
      - uses: actions/upload-artifact@v4
        with:
          name: webstaff-test-build
          path: clients/
          retention-days: 7
