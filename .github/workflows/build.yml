name: Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate example intake
        run: python3 builder/site_generator.py --intake tests/fixtures/phoenix_hvac_intake.json --validate

      - name: Build example site
        run: python3 builder/site_generator.py --intake tests/fixtures/phoenix_hvac_intake.json

      - name: Confirm output
        run: |
          ls clients/
          echo "Build succeeded ✅"
