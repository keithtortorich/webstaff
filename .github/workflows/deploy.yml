name: Deploy to Netlify

on:
  workflow_dispatch:
    inputs:
      intake_file:
        description: "Path to intake JSON (e.g. tests/fixtures/example_intake.json)"
        required: true
        default: "tests/fixtures/example_intake.json"
      site_id:
        description: "Netlify Site ID"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: python3 builder/site_generator.py --intake "${{ github.event.inputs.intake_file }}"

      - name: Find output dir
        id: outdir
        run: |
          DIR=$(ls -t clients/ | head -1)
          echo "dir=clients/$DIR" >> $GITHUB_OUTPUT
          echo "Built: clients/$DIR"

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=${{ steps.outdir.outputs.dir }} --prod --site=${{ github.event.inputs.site_id }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
