# netlify.toml — WebStaff deployment config

[build]
  # The build command runs the site generator against an intake file.
  # Set INTAKE_FILE as a Netlify environment variable per client site.
  command   = "python3 builder/site_generator.py --intake $INTAKE_FILE"
  publish   = "clients"

[build.environment]
  PYTHON_VERSION = "3.11"

# API function (optional: deploy build API as a Netlify Function)
[functions]
  directory = "netlify/functions"

# Redirect the intake form submission to the build API
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# SPA fallback for client subdirectories
[[redirects]]
  from   = "/clients/*"
  to     = "/clients/:splat/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"
